<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card shadow">
<div class="card-body">

<h2 class="text-center mb-4">Kaydı Düzenle</h2>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Tutar</label>
        <input type="number" step="0.01" name="tutar" class="form-control" value="{{ kayit[1] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Kategori</label>
        <input type="text" name="kategori" class="form-control" value="{{ kayit[2] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Açıklama</label>
        <input type="text" name="aciklama" class="form-control" value="{{ kayit[3] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Tarih</label>
        <input type="text" name="tarih" class="form-control" value="{{ kayit[4] }}" required>
    </div>

    <button class="btn btn-warning w-100">Güncelle</button>
</form>

<hr>
<a href="/raporlar" class="btn btn-outline-secondary w-100">Raporlara Dön</a>

</div>
</div>
</div>
</div>
</div>

</body>
</html>
