{% extends "layout.html" %}

{% block title %}Kod Doğrula{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:75vh;">
    <div class="col-md-6 col-lg-5">

        <div class="card-modern form-card">

            <div class="text-center mb-4">
                <div class="stat-icon bg-purple-soft mx-auto mb-3">
                    <i class="bi bi-shield-check"></i>
                </div>

                <h2 class="fw-bold">Kod Doğrulama</h2>
                <p class="text-muted">
                    E-posta adresinize gönderilen 6 haneli kodu girin.
                </p>
            </div>

            <form method="POST">

                <div class="mb-4">
                    <label class="form-label">Doğrulama Kodu</label>
                    <input
                        type="text"
                        name="kod"
                        class="form-control text-center"
                        placeholder="123456"
                        maxlength="6"
                        required>
                </div>

                <button class="btn-gradient w-100">
                    <i class="bi bi-check-circle"></i>
                    Kodu Doğrula
                </button>

            </form>

            <div class="text-center mt-4">
                <a href="/login" class="text-decoration-none fw-bold">
                    Giriş sayfasına dön
                </a>
            </div>

        </div>

    </div>
</div>

{% endblock %}
